<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Terpadu | Jaspel RSUD</title>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .hospital-logo { font-size: 50px; margin-bottom: 10px; }
        h2 { color: #2d3436; margin-bottom: 5px; font-size: 22px; }
        p { color: #636e72; font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #2d3436; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #0984e3; box-shadow: 0 0 0 3px rgba(9, 132, 227, 0.1); }
        .btn-login { width: 100%; padding: 12px; background: #0984e3; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #074b83; transform: translateY(-1px); }
        .btn-login:disabled { background: #b2bec3; cursor: not-allowed; }
        .error-msg { color: #d63031; font-size: 13px; margin-top: 15px; display: none; background: #fadbd8; padding: 10px; border-radius: 5px; border: 1px solid #f5c6cb;}
        .footer { margin-top: 30px; font-size: 11px; color: #b2bec3; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="hospital-logo">🏥</div>
    <h2>Portal Jaspel RSUD</h2>
    <p>Silakan masuk untuk mengakses sistem</p>

    <div class="form-group">
        <label>Nama Pengguna / Email</label>
        <input type="text" id="username" placeholder="Masukkan username..." autocomplete="off">
    </div>

    <div class="form-group">
        <label>Kata Sandi</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-login" id="btnLogin" onclick="handleLogin()">Masuk ke Sistem</button>
    
    <div id="error" class="error-msg">❌ Username atau password salah!</div>

    <div class="footer">
        © 2026 Husni Muarif <br>
        Sistem Informasi Jasa Pelayanan Terpadu
    </div>
</div>

<script>
    async function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const err = document.getElementById('error');
        const btn = document.getElementById('btnLogin');

        // Validasi Kosong
        if (!u || !p) {
            err.innerText = "❌ Harap isi username dan kata sandi!";
            err.style.display = "block";
            return;
        }

        btn.innerText = "⏳ Memvalidasi...";
        btn.disabled = true;
        err.style.display = "none";

        try {
            // Tembak API ke Google Apps Script
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "login", username: u, password: p })
            });
            
            const res = await response.json();

            if (res.status === "success") {
                // 1. Simpan Role ke LocalStorage (Agar Navbar menyesuaikan)
                localStorage.setItem("userRole", res.role);
                localStorage.setItem("userName", res.user);

                // 2. Redirect berdasarkan Role
                if (res.role === "direksi") {
                    window.location.href = "dashboard.html";
                } else if (res.role === "operator") {
                    window.location.href = "entry_massal.html";
                } else {
                    window.location.href = "index.html"; 
                }
            } else {
                // Tampilkan pesan gagal (salah password)
                err.innerText = "❌ " + res.message;
                err.style.display = "block";
            }
        } catch (e) {
            err.innerText = "❌ Gagal menghubungi server. Periksa koneksi Anda.";
            err.style.display = "block";
        } finally {
            btn.innerText = "Masuk ke Sistem";
            btn.disabled = false;
        }
    }

    // Tekan Enter untuk login
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
