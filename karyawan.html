<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Database Karyawan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; font-size: 13px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 100%; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .controls-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        input[type="text"], input[type="number"], select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; outline: none; width: 100%; box-sizing: border-box;}
        .search-box { width: 250px !important; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
        th { background: #004085; color: white; }
        tr:hover { background-color: #f8f9fa; }
        
        .btn { padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s;}
        .btn:hover { filter: brightness(0.9); }
        .btn-refresh { background: #28a745; color: white; font-size: 13px;}
        .btn-add { background: #007bff; color: white; font-size: 13px;}
        .btn-edit { background: #17a2b8; color: white; }
        
        /* Modal Style */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background:white; width: 700px; margin: 30px auto; padding: 25px; border-radius:8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 85vh; display: flex; flex-direction: column;}
        .modal-body { overflow-y: auto; padding-right: 10px; margin-bottom: 15px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group label { display: block; font-weight: bold; font-size: 11px; margin-bottom: 4px; color: #555; text-transform: uppercase; }
        
        .section-title { grid-column: 1 / -1; background: #e9ecef; padding: 8px 10px; font-weight: bold; color: #004085; border-radius: 4px; margin-top: 10px; font-size: 12px;}
        .highlight-section { background: #ffeeba; color: #856404; }
        
        /* Style untuk Indikator Kinerja */
        .kinerja-box { background: #f8f9fa; padding: 5px 8px; border-radius: 5px; border: 1px solid #ddd; display: inline-block; min-width: 100px;}
        .kinerja-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 2px;}
        .k-hijau { color: #28a745; font-weight: bold; }
        .k-merah { color: #dc3545; font-weight: bold; }
        .status-nonaktif { background: #dc3545 !important; color: white !important; }
    </style>
    <script>
    if (!localStorage.getItem("userRole")) { window.location.href = "login.html"; }
    </script>
    <script src="config.js"></script>
</head>

<script>renderNavbar();</script>
<div class="card">
    <div class="header">
        <h2 style="margin:0; color: #004085;">👥 Database Induk Karyawan</h2>
        <div>
            <button class="btn btn-add" style="padding:8px 15px; margin-right: 5px;" onclick="bukaModalBaru()">➕ Tambah Karyawan</button>
            <button class="btn btn-refresh" style="padding:8px 15px;" onclick="loadData()">🔄 Segarkan Data</button>
        </div>
    </div>

    <div class="controls-container">
        <select id="limitData" onchange="renderTableData()" style="width: 120px;">
            <option value="15">15 Baris</option>
            <option value="50">50 Baris</option>
            <option value="100">100 Baris</option>
            <option value="All">Semua</option>
        </select>
        
        <input type="text" id="search" class="search-box" placeholder="Cari NIK, Nama, atau Unit..." onkeyup="debounceSearch()">
        <label style="font-size:12px; margin-left:15px; cursor:pointer;">
    <input type="checkbox" id="hideNonaktif" onchange="applyFilter()" checked> Sembunyikan Nonaktif
</label>
    </div>

    <table>
        <thead>
            <tr>
                <th>NIK / NIP</th>
                <th>Nama Lengkap & Gelar</th>
                <th>Pend. / Jabatan</th>
                <th>Unit Utama</th>
                <th>Status</th>
                <th>Capaian Kinerja</th> <th style="width: 100px; text-align:center;">Aksi</th>
            </tr>
        </thead>
        <tbody id="bodyTabel">
            <tr><td colspan="7" style="text-align:center; padding: 20px;">Memuat data karyawan...</td></tr>
        </tbody>
    </table>
</div>

                <div class="form-group"><label>Kontribusi Tim 2</label>
                    <select id="k_jab_tim2">
                        <option value="-">- Tidak Ada -</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
                    </select>
                </div>

                <div class="form-group"><label>Nama Tim 3</label>
                    <select id="k_tim3" onchange="toggleLainnya('k_tim3', 'k_tim3_lainnya')">
                        <option value="-">- Tidak Ada -</option>
                        <option value="Komite Medis">Komite Medis</option>
                        <option value="Komite Keperawatan">Komite Keperawatan</option>
                        <option value="Komite Kesehatan Lain">Komite Kesehatan Lain</option>
                        <option value="Komite Etik dan Hukum">Komite Etik dan Hukum</option>
                        <option value="Komite Mutu dan keselamatan pasien">Komite Mutu dan keselamatan pasien</option>
                        <option value="Komite PPI">Komite PPI</option>
                        <option value="Komite Farmasi dan Terapi">Komite Farmasi dan Terapi</option>
                        <option value="Komite Rekam Medis">Komite Rekam Medis</option>
                        <option value="Tim Casemix">Tim Casemix</option>
                        <option value="Tim PIPP">Tim PIPP</option>
                        <option value="Tim Surveillance Epidemiologi">Tim Surveillance Epidemiologi</option>
                        <option value="BPJS Tenaga Kerja">BPJS Tenaga Kerja</option>
                        <option value="Tim SIMRS">Tim SIMRS</option>
                        <option value="PPR">PPR</option>
                        <option value="Tim JP">Tim JP</option>
                        <option value="Komite K3">Komite K3</option>
                        <option value="Sekretariat Akreditasi">Sekretariat Akreditasi</option>
                        <option value="Tim Apotek Online">Tim Apotek Online</option>
                        <option value="TIM PPA DAN AKTA KELAHIRAN">TIM PPA DAN AKTA KELAHIRAN</option>
                        <option value="Tim PPRA">Tim PPRA</option>
                        <option value="Lainnya">Lainnya (Ketik Manual)...</option>
                    </select>
                    <input type="text" id="k_tim3_lainnya" placeholder="Ketik nama tim..." style="display:none; margin-top:5px; background-color:#e8f4f8; border:1px solid #007bff;">
                </div>
                <div class="form-group"><label>Kontribusi Tim 3</label>
                    <select id="k_jab_tim3">
                        <option value="-">- Tidak Ada -</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
                    </select>
                </div>
            </div>
        </div>

        <div style="display:flex; gap:10px; border-top: 1px solid #eee; padding-top: 15px;">
            <button class="btn btn-refresh" style="flex: 2; padding: 12px; font-size:14px;" id="btnSimpan" onclick="simpanKaryawan()">💾 Simpan Perubahan</button>
            <button id="btnHapus" class="btn" style="flex: 1; padding: 12px; font-size:14px; background:#dc3545; color:white; display:none;" onclick="hapusKaryawan()">🗑️ Hapus</button>
            <button class="btn" style="flex: 1; padding: 12px; font-size:14px; background:#ddd; color:#333;" onclick="tutupModal()">Batal</button>
        </div>
    </div>
</div>

<script>
    let dataKaryawan = [];
    let dataFiltered = [];
    let isEditMode = true; // State penanda apakah Add Baru atau Edit

    async function loadData() {
        document.getElementById('bodyTabel').innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px;">Mengambil data dari Server...</td></tr>';
        try {
            const response = await fetch(WEB_APP_URL, { 
                method: "POST", 
                headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                body: JSON.stringify({ action: "get_karyawan" }) 
            });
            const res = await response.json();
            dataKaryawan = res.data;
            applyFilter();
        } catch (e) {
            document.getElementById('bodyTabel').innerHTML = '<tr><td colspan="7" style="color:red; text-align:center;">Gagal memuat data.</td></tr>';
        }
    }

    let timerPencarian;
    function debounceSearch() {
        clearTimeout(timerPencarian);
        timerPencarian = setTimeout(applyFilter, 400); 
    }

   function applyFilter() {
        const txt = document.getElementById('search').value.toLowerCase();
        const hideNonaktif = document.getElementById('hideNonaktif') ? document.getElementById('hideNonaktif').checked : false;

        dataFiltered = dataKaryawan.filter(k => {
            // Filter 1: Sembunyikan yang nonaktif jika checkbox dicentang
            if (hideNonaktif && k.status === 'Nonaktif') return false;
            
            // Filter 2: Pencarian Teks
            return String(k.nama||"").toLowerCase().includes(txt) || 
                   String(k.nik||"").toLowerCase().includes(txt) ||
                   String(k.unit||"").toLowerCase().includes(txt);
        });
        renderTableData();
    }
    
    function renderTableData() {
        const body = document.getElementById('bodyTabel');
        const limitVal = document.getElementById('limitData').value;
        const disp = limitVal === "All" ? dataFiltered : dataFiltered.slice(0, parseInt(limitVal));

        let html = "";
        if (disp.length === 0) { html = '<tr><td colspan="7" style="text-align:center; padding: 20px;">Tidak ada data karyawan ditemukan.</td></tr>'; } 
        else {
            disp.forEach(k => {
                let nilaiProd = Math.round((k.produktivitas !== undefined ? k.produktivitas : 1) * 100);
                let nilaiDis = Math.round((k.disiplin !== undefined ? k.disiplin : 1) * 100);
                
                let classProd = nilaiProd < 100 ? "k-merah" : "k-hijau";
                let classDis = nilaiDis < 100 ? "k-merah" : "k-hijau";
                
                let badgeHukuman = k.hukuman > 0 ? `<span style="background:#dc3545; color:white; padding:2px 5px; border-radius:3px; font-size:10px; margin-top:4px; display:inline-block;">Sanksi ${k.hukuman * 100}%</span>` : "";
                let classStatus = k.status === 'Nonaktif' ? 'status-nonaktif' : '';

                html += `<tr>
                    <td><strong style="color:#004085;">${k.nik}</strong><br><small style="color:#666;">${k.nip||'-'}</small></td>
                    <td style="font-weight:bold;">${k.nama} <br>${badgeHukuman}</td>
                    <td>${k.pendidikan}<br><small style="color:#007bff; font-weight:bold;">${k.jabatan}</small></td>
                    <td>${k.unit}</td>
                    <td><span class="${classStatus}" style="background:#e9ecef; padding:4px 8px; border-radius:4px; font-size:11px; font-weight:bold;">${k.status}</span></td>
                    <td>
                        <div class="kinerja-box">
                            <div class="kinerja-item"><span>Prod:</span> <span class="${classProd}">${nilaiProd}%</span></div>
                            <div class="kinerja-item"><span>Disiplin:</span> <span class="${classDis}">${nilaiDis}%</span></div>
                        </div>
                    </td>
                    <td style="text-align:center;">
                        <button class="btn btn-edit" onclick="bukaModal('${k.nik}')">👁️ Edit</button>
                    </td>
                </tr>`;
            });
        }
        body.innerHTML = html;
    }

    function toggleGolongan() {
        const stat = document.getElementById('k_status').value;
        const containerGolongan = document.getElementById('container_golongan');
        if(stat === 'PNS') {
            containerGolongan.style.display = 'block';
        } else {
            containerGolongan.style.display = 'none';
        }
    }
    
    function toggleLainnya(selectId, inputId) {
        const selectElement = document.getElementById(selectId).value;
        const inputElement = document.getElementById(inputId);
        if(selectElement === "Lainnya") {
            inputElement.style.display = 'block';
        } else {
            inputElement.style.display = 'none';
        }
    }

    function tutupModal() { document.getElementById('modalKaryawan').style.display = 'none'; }

    // FUNGSI KHUSUS UNTUK TAMBAH KARYAWAN BARU
    function bukaModalBaru() {
        isEditMode = false;
        document.getElementById('modalTitle').innerText = "➕ Tambah Karyawan Baru";
        
        // Kosongkan form
        document.querySelectorAll('#modalKaryawan input').forEach(input => input.value = '');
        document.querySelectorAll('#modalKaryawan select').forEach(select => select.value = '-');
        
        // Set Default
        document.getElementById('k_produktivitas').value = "1";
        document.getElementById('k_disiplin').value = "1";
        document.getElementById('k_hukuman').value = "0";
        document.getElementById('k_status').value = "PNS";
        toggleGolongan();

        // Buka Kunci NIK (karena mau input baru)
        let inputNik = document.getElementById('k_nik');
        inputNik.disabled = false;
        inputNik.style.background = "#fff";
        inputNik.placeholder = "Wajib masukkan 16 Digit NIK KTP...";

        // Sembunyikan Tombol Hapus
        document.getElementById('btnHapus').style.display = "none";
        document.getElementById('modalKaryawan').style.display = 'block';
    }

    function bukaModal(nik) {
        isEditMode = true;
        document.getElementById('modalTitle').innerText = "📋 Detail & Evaluasi Karyawan";

        const k = dataKaryawan.find(x => x.nik == nik);
        if(!k) return;
        
        // Kunci NIK (Mode Edit)
        let inputNik = document.getElementById('k_nik');
        inputNik.value = k.nik;
        inputNik.disabled = true;
        inputNik.style.background = "#e9ecef";

        document.getElementById('k_nip').value = k.nip;
        document.getElementById('k_nama').value = k.nama;
        document.getElementById('k_rekening').value = k.rekening || "";
        
        document.getElementById('k_produktivitas').value = k.produktivitas;
        document.getElementById('k_disiplin').value = k.disiplin;
        document.getElementById('k_hukuman').value = k.hukuman;

        const setDropdownSafe = (id, value, fallback) => {
            const el = document.getElementById(id);
            let exists = Array.from(el.options).some(opt => opt.value === String(value).trim());
            el.value = exists ? String(value).trim() : fallback;
        };

        setDropdownSafe('k_pendidikan', k.pendidikan, '-');
        setDropdownSafe('k_unit', k.unit, '-');
        setDropdownSafe('k_tmt', k.tmt, '-');
        setDropdownSafe('k_prestasi', k.prestasi, '-'); 
        
        const setupFieldLainnya = (selectId, inputId, valData) => {
            const selectEl = document.getElementById(selectId);
            const inputEl = document.getElementById(inputId);
            let val = String(valData || "").trim();
            let exists = Array.from(selectEl.options).some(opt => opt.value === val);
            
            if (exists) {
                selectEl.value = val;
                inputEl.style.display = 'none';
                inputEl.value = "";
            } else if (val !== "" && val !== "-") {
                selectEl.value = "Lainnya";
                inputEl.style.display = 'block';
                inputEl.value = val;
            } else {
                selectEl.value = "-";
                inputEl.style.display = 'none';
                inputEl.value = "";
            }
        };

        setupFieldLainnya('k_jabatan', 'k_jabatan_lainnya', k.jabatan);
        setupFieldLainnya('k_tim1', 'k_tim1_lainnya', k.tim1);
        setupFieldLainnya('k_tim2', 'k_tim2_lainnya', k.tim2);
        setupFieldLainnya('k_tim3', 'k_tim3_lainnya', k.tim3);

        document.getElementById('k_status').value = k.status;
        
        let gol = k.golongan || "-";
        if (!["I", "II", "III", "IV"].includes(gol)) gol = "-";
        document.getElementById('k_golongan').value = gol;
        toggleGolongan(); 

        const jnsSelect = document.getElementById('k_jab_non_struk');
        let jnsData = String(k.jab_non_struk || "").trim();
        let optionExists = Array.from(jnsSelect.options).some(opt => opt.value === jnsData);
        jnsSelect.value = optionExists ? jnsData : "Tidak ada";

        document.getElementById('k_risiko').value = k.risiko || "Tidak ada";
        document.getElementById('k_radiasi').value = k.radiasi || "Tidak ada";
        document.getElementById('k_emergensi').value = k.emergensi || "Non Emergency";
        document.getElementById('k_pola_kerja').value = k.pola_kerja || "Non Rotasi";
        document.getElementById('k_oncall').value = k.oncall || "Tidak";

        let j1 = String(k.jab_tim1 || "").trim().toUpperCase();
        document.getElementById('k_jab_tim1').value = ["A","B","C","D"].includes(j1) ? j1 : "-";
        
        let j2 = String(k.jab_tim2 || "").trim().toUpperCase();
        document.getElementById('k_jab_tim2').value = ["A","B","C","D"].includes(j2) ? j2 : "-";
        
        let j3 = String(k.jab_tim3 || "").trim().toUpperCase();
        document.getElementById('k_jab_tim3').value = ["A","B","C","D"].includes(j3) ? j3 : "-";

        // Tampilkan Tombol Hapus (Hanya saat edit)
        document.getElementById('btnHapus').style.display = "block";
        document.getElementById('modalKaryawan').style.display = 'block';
    }

    async function simpanKaryawan() {
        const btn = document.getElementById("btnSimpan");
        const nikTarget = document.getElementById('k_nik').value;
        const statusPegawai = document.getElementById('k_status').value;
        
        const golonganFinal = statusPegawai === 'PNS' ? document.getElementById('k_golongan').value : 'Non-PNS';
        
        const getValueWithLainnya = (selectId, inputId) => {
            const dropVal = document.getElementById(selectId).value;
            return dropVal === 'Lainnya' ? document.getElementById(inputId).value : (dropVal === '-' ? '' : dropVal);
        };

        // --- AWAL LOGIKA SOFT DELETE ---
        let prodVal = Number(document.getElementById('k_produktivitas').value) || 0;
        let disVal = Number(document.getElementById('k_disiplin').value) || 0;
        let jabTim1Val = document.getElementById('k_jab_tim1').value === "-" ? "" : document.getElementById('k_jab_tim1').value;
        let jabTim2Val = document.getElementById('k_jab_tim2').value === "-" ? "" : document.getElementById('k_jab_tim2').value;
        let jabTim3Val = document.getElementById('k_jab_tim3').value === "-" ? "" : document.getElementById('k_jab_tim3').value;

        // Jika Karyawan Nonaktif, Paksa Kinerja dan Tim Menjadi 0 / Kosong
        if (statusPegawai === "Nonaktif") {
            prodVal = 0;
            disVal = 0;
            jabTim1Val = "";
            jabTim2Val = "";
            jabTim3Val = "";
            alert("⚠️ Sistem otomatis men-Nol-kan Produktivitas, Disiplin, dan Jabatan Tim untuk karyawan Nonaktif agar tidak menerima JTL bulan depan.");
        }
        // --- AKHIR LOGIKA SOFT DELETE ---

        const payload = {
            nip: document.getElementById('k_nip').value,
            nama: document.getElementById('k_nama').value,
            rekening: document.getElementById('k_rekening').value,
            golongan: golonganFinal,
            
            produktivitas: prodVal, // Menggunakan variabel yang sudah difilter
            disiplin: disVal,       // Menggunakan variabel yang sudah difilter
            hukuman: Number(document.getElementById('k_hukuman').value) || 0,

            pendidikan: document.getElementById('k_pendidikan').value === '-' ? '' : document.getElementById('k_pendidikan').value,
            unit: document.getElementById('k_unit').value === '-' ? '' : document.getElementById('k_unit').value,
            tmt: document.getElementById('k_tmt').value === '-' ? '' : document.getElementById('k_tmt').value,
            prestasi: document.getElementById('k_prestasi').value === '-' ? '' : document.getElementById('k_prestasi').value,
            
            status: statusPegawai,
            jab_non_struk: document.getElementById('k_jab_non_struk').value,
            risiko: document.getElementById('k_risiko').value,
            radiasi: document.getElementById('k_radiasi').value,
            emergensi: document.getElementById('k_emergensi').value,
            pola_kerja: document.getElementById('k_pola_kerja').value,
            oncall: document.getElementById('k_oncall').value,
            
            jabatan: getValueWithLainnya('k_jabatan', 'k_jabatan_lainnya'),
            tim1: getValueWithLainnya('k_tim1', 'k_tim1_lainnya'),
            tim2: getValueWithLainnya('k_tim2', 'k_tim2_lainnya'),
            tim3: getValueWithLainnya('k_tim3', 'k_tim3_lainnya'),

            jab_tim1: jabTim1Val, // Menggunakan variabel yang sudah difilter
            jab_tim2: jabTim2Val, // Menggunakan variabel yang sudah difilter
            jab_tim3: jabTim3Val  // Menggunakan variabel yang sudah difilter
        };

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: actionCommand, nik: nikTarget, payload: payload })
            });
            const res = await response.json();
            alert("✅ " + res.message);
            tutupModal();
            loadData();
        } catch(e) {
            alert("❌ Gagal menyimpan data. Periksa koneksi internet Anda.");
        } finally {
            btn.innerText = "💾 Simpan Perubahan"; btn.disabled = false;
        }
    }

    // FUNGSI MENGHAPUS KARYAWAN
    async function hapusKaryawan() {
        const nikTarget = document.getElementById('k_nik').value;
        const namaTarget = document.getElementById('k_nama').value;

        // Peringatan ganda karena berisiko
        if(!confirm(`⚠️ PERINGATAN: Anda yakin ingin MENGHAPUS PERMANEN data ${namaTarget} (${nikTarget})?\n\nSaran: Lebih baik ubah Status Kepegawaian menjadi "Nonaktif / Keluar" agar data sejarah Jaspel sebelumnya tidak rusak.`)) return;
        if(!confirm(`Data yang dihapus tidak bisa dikembalikan. Lanjutkan hapus?`)) return;

        const btnHps = document.getElementById('btnHapus');
        btnHps.innerText = "⏳ Menghapus..."; btnHps.disabled = true;

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "delete_karyawan", nik: nikTarget })
            });
            const res = await response.json();
            
            if (res.status === "success") {
                alert("✅ " + res.message);
                tutupModal();
                loadData();
            } else {
                alert("❌ " + res.message);
            }
        } catch(e) {
            alert("❌ Gagal menghapus data. Periksa koneksi.");
        } finally {
            btnHps.innerText = "🗑️ Hapus"; btnHps.disabled = false;
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
